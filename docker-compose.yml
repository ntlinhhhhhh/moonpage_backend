      - GoogleCloud__StorageBucket=moodyfy-3f2dd.firebasestorage.app

      - GoogleCloud__ServiceAccountPath=/app/firebase-key.json
      - Firebase__ProjectId=moodyfy-3f2dd
      
      # jwt settings
      - JwtSettings__Secret=NNTExNDU1MTU0MzkwLW04am1wbGIxNThha2pqODc0Mjg4cGlwa3QzZW1zZXQwLmFwcHMuZ29vZ2xldXNlcmNvbnRlbnQuY29t
      - JwtSettings__Issuer=DiaryApp
      - JwtSettings__Audience=DiaryApp
